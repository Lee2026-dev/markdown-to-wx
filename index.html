<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>微信公众号 Markdown 编辑器</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<link id="hljsCss" rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/KaTeX/0.16.9/katex.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
:root {
  --accent: #07C160;
  --bg: #111318;
  --surf: #191b22;
  --surf2: #1f2230;
  --surf3: #262a36;
  --border: #2b2f3e;
  --text: #dce1f5;
  --muted: #646b8c;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body { font-family: 'Noto Sans SC', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

/* Header */
header {
  height: 50px; flex-shrink: 0;
  background: var(--surf); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between; padding: 0 18px; z-index: 20;
}
.logo { display: flex; align-items: center; gap: 9px; font-size: 14px; font-weight: 600; }
.logo-badge { width: 26px; height: 26px; border-radius: 7px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 14px; }
.hbtns { display: flex; gap: 8px; align-items: center; }
.btn { display: inline-flex; align-items: center; gap: 5px; padding: 6px 13px; border-radius: 7px; border: none; font-size: 12.5px; font-family: inherit; font-weight: 500; cursor: pointer; transition: all .15s; }
.btn-outline { background: var(--surf2); color: var(--muted); border: 1px solid var(--border); }
.btn-outline:hover { border-color: var(--accent); color: var(--text); }
.btn-outline.on { border-color: var(--accent); color: var(--accent); background: rgba(7,193,96,.08); }
.btn-primary { background: var(--accent); color: #fff; }
.btn-primary:hover { filter: brightness(1.1); box-shadow: 0 3px 14px rgba(7,193,96,.4); transform: translateY(-1px); }
.btn-primary:active { transform: none; }
.btn-primary.ok { background: #2a8a5a; }

/* Layout */
.workspace { flex: 1; display: flex; overflow: hidden; }

/* Editor */
.ed-side { width: 50%; display: flex; flex-direction: column; border-right: 1px solid var(--border); }
.bar { height: 34px; flex-shrink: 0; background: var(--surf2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 8px; }
.bar-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.bar-tag { font-size: 10px; color: var(--muted); background: var(--surf3); padding: 2px 7px; border-radius: 10px; opacity: .8; }
#editor { flex: 1; background: var(--surf); color: #c9d1d9; border: none; outline: none; resize: none; padding: 20px 22px; font-family: 'JetBrains Mono', monospace; font-size: 13px; line-height: 1.8; caret-color: var(--accent); scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
#editor::placeholder { color: var(--muted); opacity: .4; font-style: italic; }
#editor::-webkit-scrollbar { width: 5px; }
#editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
.ed-footer { height: 26px; flex-shrink: 0; background: var(--surf2); border-top: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; gap: 16px; font-size: 11px; color: var(--muted); }

/* Preview */
.pv-side { flex: 1; display: flex; flex-direction: column; background: #efefef; overflow: hidden; }
.pv-scroll { flex: 1; overflow-y: auto; padding: 20px 18px; scrollbar-width: thin; scrollbar-color: #ccc transparent; }
.pv-scroll::-webkit-scrollbar { width: 5px; }
.pv-scroll::-webkit-scrollbar-thumb { background: #ccc; border-radius: 3px; }
.wx-article { background: #fff; border-radius: 6px; box-shadow: 0 2px 16px rgba(0,0,0,.09); padding: 28px 22px 36px; max-width: 560px; margin: 0 auto; min-height: 120px; }

/* Style Panel */
.sp { width: 232px; min-width: 232px; background: var(--surf); border-left: 1px solid var(--border); display: flex; flex-direction: column; overflow-y: auto; scrollbar-width: thin; scrollbar-color: var(--border) transparent; transition: width .22s, min-width .22s, opacity .18s; }
.sp.hidden { width: 0; min-width: 0; opacity: 0; overflow: hidden; border-left: none; pointer-events: none; }
.sp-head { height: 34px; flex-shrink: 0; background: var(--surf2); border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 14px; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .1em; color: var(--muted); }
.sp-sec { padding: 13px 14px; border-bottom: 1px solid var(--border); }
.sp-sec-title { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); margin-bottom: 10px; }

/* Swatches */
.swatches { display: grid; grid-template-columns: repeat(5,1fr); gap: 6px; margin-bottom: 8px; }
.sw { aspect-ratio: 1; border-radius: 6px; cursor: pointer; border: 2px solid transparent; transition: transform .14s, border-color .14s; }
.sw:hover { transform: scale(1.15); }
.sw.on { border-color: #fff; box-shadow: 0 0 0 2px var(--accent); }
.color-row { display: flex; align-items: center; gap: 7px; margin-top: 4px; }
.color-row label { font-size: 11px; color: var(--muted); flex-shrink: 0; }
input[type=color] { width: 30px; height: 26px; border: 1px solid var(--border); border-radius: 5px; background: var(--surf2); cursor: pointer; padding: 2px; flex-shrink: 0; }
.hex-in { flex: 1; background: var(--surf2); border: 1px solid var(--border); color: var(--text); font-size: 11px; padding: 4px 7px; border-radius: 5px; font-family: 'JetBrains Mono', monospace; outline: none; }
.hex-in:focus { border-color: var(--accent); }

/* Sliders */
.sl-row { display: flex; align-items: center; gap: 7px; margin-bottom: 8px; }
.sl-lbl { font-size: 11px; color: var(--muted); width: 54px; flex-shrink: 0; }
.sl-val { font-size: 11px; color: var(--text); width: 34px; text-align: right; font-family: monospace; flex-shrink: 0; }
input[type=range] { flex: 1; height: 4px; cursor: pointer; accent-color: var(--accent); }

/* Select */
.sp-select { width: 100%; background: var(--surf2); border: 1px solid var(--border); color: var(--text); font-size: 12px; padding: 6px 8px; border-radius: 6px; cursor: pointer; outline: none; font-family: inherit; }
.sp-select:focus { border-color: var(--accent); }

/* Code theme list */
.ct-list { display: flex; flex-direction: column; gap: 3px; }
.ct-item { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; font-size: 12px; cursor: pointer; border: 1px solid transparent; transition: all .14s; color: var(--muted); }
.ct-item:hover { background: var(--surf2); color: var(--text); }
.ct-item.on { background: rgba(7,193,96,.1); border-color: rgba(7,193,96,.3); color: var(--accent); }
.ct-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

/* Checkbox */
.chk-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.chk-row label { font-size: 12px; color: var(--muted); cursor: pointer; display: flex; align-items: center; gap: 5px; }
input[type=checkbox] { accent-color: var(--accent); cursor: pointer; }

/* Reset btn */
.btn-reset { margin: 12px 14px; width: calc(100% - 28px); justify-content: center; background: var(--surf2); color: var(--muted); border: 1px solid var(--border); font-size: 12px; }
.btn-reset:hover { border-color: #e74c3c; color: #e74c3c; }

/* Article styles */
.wx-article {
  --ac: #07C160;
  --body-fs: 15px;
  --body-lh: 1.9;
  --para-mb: 0.9em;
  --code-fs: 13px;
  font-family: -apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif;
}
.wx-article h1 { font-size:1.43em; font-weight:700; color:#111; margin:0 0 .9em; padding-bottom:.4em; border-bottom:2.5px solid var(--ac); line-height:1.38; }
.wx-article h2 { font-size:1.17em; font-weight:700; color:#111; margin:1.6em 0 .55em; padding:.15em 0 .15em 11px; border-left:4px solid var(--ac); line-height:1.45; }
.wx-article h3 { font-size:1.05em; font-weight:600; color:#222; margin:1.3em 0 .45em; }
.wx-article h4 { font-size:1em; font-weight:600; color:#333; margin:1em 0 .4em; }
.wx-article p  { font-size:var(--body-fs); line-height:var(--body-lh); color:#333; margin:0 0 var(--para-mb); }
.wx-article ul,.wx-article ol { font-size:var(--body-fs); line-height:var(--body-lh); color:#333; margin:.3em 0 var(--para-mb); padding-left:1.6em; }
.wx-article li { margin:.28em 0; }
.wx-article blockquote { margin:1em 0; padding:10px 14px; border-left:4px solid var(--ac); background:#f6fff9; border-radius:0 6px 6px 0; color:#555; font-size:.95em; line-height:1.75; }
.wx-article strong { color:#111; font-weight:700; }
.wx-article em { color:#555; }
.wx-article a { color:var(--ac); text-decoration:none; }
.wx-article hr { border:none; border-top:1px solid #eee; margin:1.6em 0; }
.wx-article img { max-width:100%; border-radius:6px; }
.wx-article :not(pre)>code { background:#f5f5f6; padding:2px 6px; border-radius:4px; font-family:'JetBrains Mono',monospace; font-size:.88em; color:#c0392b; border:1px solid #ebebeb; }
.wx-article table { width:100%; border-collapse:collapse; margin:.9em 0; font-size:.93em; }
.wx-article th { background:#f5f5f5; color:#222; font-weight:600; padding:8px 12px; border:1px solid #e0e0e0; text-align:left; }
.wx-article td { padding:7px 12px; border:1px solid #eaeaea; color:#333; }
.wx-article tr:nth-child(even) td { background:#fafafa; }
.wx-article .katex-display { margin:1em 0; overflow-x:auto; text-align:center; }

/* Code block */
.code-wrap { margin:1.1em 0; border-radius:10px; overflow:hidden; font-family:'JetBrains Mono',monospace; box-shadow:0 3px 14px rgba(0,0,0,.2); }
.code-head { display:flex; align-items:center; justify-content:space-between; padding:9px 14px; }
.code-dots { display:flex; gap:6px; align-items:center; }
.code-dot { width:11px; height:11px; border-radius:50%; display:inline-block; }
.code-lang { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.1em; opacity:.5; }
.code-wrap pre { margin:0; padding:14px 16px; overflow-x:auto; line-height:1.75; font-family:'JetBrains Mono',monospace; font-size:var(--code-fs,13px); }
.code-wrap pre code { background:none !important; padding:0; border:none; font-family:inherit; font-size:inherit; border-radius:0; }
.ln-line { display:inline-flex; width:100%; }
.ln-num { opacity:.25; user-select:none; min-width:2.2em; padding-right:1.2em; text-align:right; flex-shrink:0; }
.ln-code { flex:1; }

/* Toast */
.toast { position:fixed; bottom:26px; left:50%; transform:translateX(-50%) translateY(14px); background:#111; color:#fff; padding:8px 20px; border-radius:100px; font-size:12.5px; font-weight:500; opacity:0; pointer-events:none; z-index:999; transition:all .28s cubic-bezier(.34,1.56,.64,1); border:1px solid rgba(7,193,96,.35); box-shadow:0 4px 20px rgba(0,0,0,.5); }
.toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-badge">✍️</div>
    微信公众号 Markdown 编辑器
  </div>
  <div class="hbtns">
    <button class="btn btn-outline" id="spToggle" onclick="toggleSP()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93a10 10 0 010 14.14M4.93 4.93a10 10 0 000 14.14"/></svg>
      样式调整
    </button>
    <button class="btn btn-outline" onclick="clearAll()">清空</button>
    <button class="btn btn-primary" id="copyBtn" onclick="doCopy()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
      一键复制
    </button>
  </div>
</header>

<div class="workspace">

  <div class="ed-side">
    <div class="bar">
      <span class="bar-title">Markdown</span>
      <span class="bar-tag">代码 · 公式 · 表格</span>
    </div>
    <textarea id="editor" spellcheck="false" placeholder="在此输入 Markdown…"></textarea>
    <div class="ed-footer">
      <span id="charCount">字符 0</span>
      <span id="lineCount">行 1</span>
    </div>
  </div>

  <div class="pv-side">
    <div class="bar" style="background:#e8e8e8;border-bottom:1px solid #ddd;">
      <span class="bar-title" style="color:#aaa;">预览</span>
      <span class="bar-tag" style="background:#ddd;color:#999;">微信公众号样式</span>
    </div>
    <div class="pv-scroll">
      <div class="wx-article" id="preview"></div>
    </div>
  </div>

  <div class="sp hidden" id="sp">
    <div class="sp-head">🎨 样式设置</div>

    <div class="sp-sec">
      <div class="sp-sec-title">主题色</div>
      <div class="swatches" id="swatches">
        <div class="sw on"  style="background:#07C160" data-c="#07C160" onclick="setAccent('#07C160',this)" title="微信绿"></div>
        <div class="sw" style="background:#1677FF" data-c="#1677FF" onclick="setAccent('#1677FF',this)"></div>
        <div class="sw" style="background:#FF6B35" data-c="#FF6B35" onclick="setAccent('#FF6B35',this)"></div>
        <div class="sw" style="background:#9B59B6" data-c="#9B59B6" onclick="setAccent('#9B59B6',this)"></div>
        <div class="sw" style="background:#E74C3C" data-c="#E74C3C" onclick="setAccent('#E74C3C',this)"></div>
        <div class="sw" style="background:#F39C12" data-c="#F39C12" onclick="setAccent('#F39C12',this)"></div>
        <div class="sw" style="background:#1ABC9C" data-c="#1ABC9C" onclick="setAccent('#1ABC9C',this)"></div>
        <div class="sw" style="background:#3498DB" data-c="#3498DB" onclick="setAccent('#3498DB',this)"></div>
        <div class="sw" style="background:#E91E8C" data-c="#E91E8C" onclick="setAccent('#E91E8C',this)"></div>
        <div class="sw" style="background:#2C3E50" data-c="#2C3E50" onclick="setAccent('#2C3E50',this)"></div>
      </div>
      <div class="color-row">
        <label>自定义</label>
        <input type="color" id="cpick" value="#07C160" oninput="setAccentRaw(this.value)">
        <input type="text" class="hex-in" id="chex" value="#07C160" maxlength="7" oninput="hexInput(this.value)">
      </div>
    </div>

    <div class="sp-sec">
      <div class="sp-sec-title">正文字体</div>
      <select class="sp-select" onchange="setFont(this.value)">
        <option value='-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif'>系统默认（苹方）</option>
        <option value='"Noto Serif SC",Georgia,serif'>思源宋体</option>
        <option value='"Noto Sans SC",Arial,sans-serif'>思源黑体</option>
        <option value='Georgia,"Times New Roman",serif'>Georgia</option>
      </select>
    </div>

    <div class="sp-sec">
      <div class="sp-sec-title">排版</div>
      <div class="sl-row">
        <span class="sl-lbl">正文字号</span>
        <input type="range" min="13" max="18" value="15" step=".5" oninput="setAV('--body-fs',this.value+'px');document.getElementById('vFs').textContent=this.value+'px'">
        <span class="sl-val" id="vFs">15px</span>
      </div>
      <div class="sl-row">
        <span class="sl-lbl">行高</span>
        <input type="range" min="1.4" max="2.4" value="1.9" step=".05" oninput="setAV('--body-lh',this.value);document.getElementById('vLh').textContent=this.value">
        <span class="sl-val" id="vLh">1.9</span>
      </div>
      <div class="sl-row">
        <span class="sl-lbl">段间距</span>
        <input type="range" min="0.4" max="1.8" value="0.9" step=".05" oninput="setAV('--para-mb',this.value+'em');document.getElementById('vMb').textContent=this.value">
        <span class="sl-val" id="vMb">0.9</span>
      </div>
    </div>

    <div class="sp-sec">
      <div class="sp-sec-title">代码主题</div>
      <div class="ct-list">
        <div class="ct-item on" data-t="github-dark"     data-bg="#24292e" data-hd="#1c2128" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#24292e;border:1px solid #555"></span>GitHub Dark</div>
        <div class="ct-item"   data-t="atom-one-dark"   data-bg="#282c34" data-hd="#21252b" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#282c34"></span>Atom One Dark</div>
        <div class="ct-item"   data-t="monokai-sublime" data-bg="#272822" data-hd="#1e1f1c" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#272822"></span>Monokai</div>
        <div class="ct-item"   data-t="night-owl"       data-bg="#011627" data-hd="#010e1a" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#011627"></span>Night Owl</div>
        <div class="ct-item"   data-t="github"          data-bg="#f6f8fa" data-hd="#eaecef" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#f6f8fa;border:1px solid #ccc"></span>GitHub Light</div>
        <div class="ct-item"   data-t="vs"              data-bg="#ffffff" data-hd="#f0f0f0" onclick="setCodeTheme(this)"><span class="ct-dot" style="background:#fff;border:1px solid #ccc"></span>VS Light</div>
      </div>
    </div>

    <div class="sp-sec">
      <div class="sp-sec-title">代码选项</div>
      <div class="chk-row">
        <label><input type="checkbox" id="cbLines" onchange="render()"> 显示行号</label>
      </div>
      <div class="sl-row">
        <span class="sl-lbl">代码字号</span>
        <input type="range" min="11" max="15" value="13" step=".5" oninput="setAV('--code-fs',this.value+'px');document.getElementById('vCfs').textContent=this.value+'px'">
        <span class="sl-val" id="vCfs">13px</span>
      </div>
    </div>

    <button class="btn btn-reset" onclick="if(confirm('恢复所有默认样式？'))location.reload()">↺ 恢复默认</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const S = { accent: '#07C160', codeBg: '#24292e', codeHd: '#1c2128' };

// ── Renderer ──────────────────────────────────────────
function makeRenderer() {
  const r = new marked.Renderer();
  r.code = (code, lang) => {
    const vl = lang && hljs.getLanguage(lang) ? lang : null;
    const hl = vl ? hljs.highlight(code, { language: vl }).value : hljs.highlightAuto(code).value;
    const lbl = (lang || 'text').toLowerCase();
    const nums = document.getElementById('cbLines').checked;
    let body = hl;
    if (nums) {
      const lines = hl.split('\n');
      if (!lines[lines.length-1]) lines.pop();
      body = lines.map((l,i) =>
        `<span class="ln-line"><span class="ln-num">${i+1}</span><span class="ln-code">${l}</span></span>`
      ).join('\n');
    }
    const dots = ['#ff5f56','#ffbd2e','#27c93f'].map(c =>
      `<span class="code-dot" style="background:${c}"></span>`).join('');
    return (
      `<div class="code-wrap" style="background:${S.codeBg}">` +
        `<div class="code-head" style="background:${S.codeHd}">` +
          `<span class="code-dots">${dots}</span>` +
          `<span class="code-lang" style="color:#9ca3af">${lbl}</span>` +
        `</div>` +
        `<pre style="background:${S.codeBg}"><code>${body}</code></pre>` +
      `</div>`
    );
  };
  return r;
}

// ── Math ──────────────────────────────────────────────
function protectMath(md) {
  const dm=[], im=[];
  md = md.replace(/\$\$([\s\S]+?)\$\$/g, (_,e)=>{ dm.push(e); return `DMATH${dm.length-1}Z`; });
  md = md.replace(/\$([^\n$]+?)\$/g,     (_,e)=>{ im.push(e); return `IMATH${im.length-1}Z`; });
  return {md,dm,im};
}
function restoreMath(html, dm, im) {
  html = html.replace(/DMATH(\d+)Z/g, (_,i) => {
    try { return `<span style="display:block;text-align:center;overflow-x:auto;margin:1em 0">${katex.renderToString(dm[i],{displayMode:true,throwOnError:false})}</span>`; }
    catch { return `$$${dm[i]}$$`; }
  });
  html = html.replace(/IMATH(\d+)Z/g, (_,i) => {
    try { return katex.renderToString(im[i],{throwOnError:false}); }
    catch { return `$${im[i]}$`; }
  });
  return html;
}

// ── Render ────────────────────────────────────────────
function render() {
  const raw = document.getElementById('editor').value;
  document.getElementById('charCount').textContent = `字符 ${raw.length}`;
  document.getElementById('lineCount').textContent = `行 ${raw.split('\n').length}`;
  const {md,dm,im} = protectMath(raw);
  marked.use({ renderer: makeRenderer(), breaks: true, gfm: true });
  let html = marked.parse(md);
  html = restoreMath(html, dm, im);
  document.getElementById('preview').innerHTML = html;
  document.getElementById('preview').style.setProperty('--ac', S.accent);
}

// ── Style helpers ─────────────────────────────────────
function setAV(name, val) { document.getElementById('preview').style.setProperty(name, val); }
function setFont(fam) { document.getElementById('preview').style.fontFamily = fam; }

function setAccent(color, el) {
  S.accent = color;
  document.getElementById('cpick').value = color;
  document.getElementById('chex').value = color;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
  if (el) el.classList.add('on');
  document.getElementById('preview').style.setProperty('--ac', color);
}
function setAccentRaw(color) {
  S.accent = color;
  document.getElementById('chex').value = color;
  document.querySelectorAll('.sw').forEach(s => s.classList.remove('on'));
  document.getElementById('preview').style.setProperty('--ac', color);
}
function hexInput(val) {
  if (/^#[0-9a-fA-F]{6}$/.test(val)) { document.getElementById('cpick').value = val; setAccentRaw(val); }
}

function setCodeTheme(el) {
  document.querySelectorAll('.ct-item').forEach(i => i.classList.remove('on'));
  el.classList.add('on');
  S.codeBg = el.dataset.bg;
  S.codeHd = el.dataset.hd;
  document.getElementById('hljsCss').href =
    `https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/${el.dataset.t}.min.css`;
  setTimeout(render, 60);
}

function toggleSP() {
  document.getElementById('sp').classList.toggle('hidden');
  document.getElementById('spToggle').classList.toggle('on');
}

function clearAll() {
  if (document.getElementById('editor').value && confirm('确定清空全部内容？')) {
    document.getElementById('editor').value = '';
    render();
  }
}

// ── Copy ──────────────────────────────────────────────
function doCopy() {
  const pv = document.getElementById('preview');
  const clone = pv.cloneNode(true);
  const ac  = S.accent;
  const ff  = pv.style.fontFamily || '-apple-system,"PingFang SC","Helvetica Neue",Arial,sans-serif';
  const bfs = pv.style.getPropertyValue('--body-fs') || '15px';
  const blh = pv.style.getPropertyValue('--body-lh') || '1.9';
  const pmb = pv.style.getPropertyValue('--para-mb') || '0.9em';
  const cfs = pv.style.getPropertyValue('--code-fs') || '13px';

  const M = {
    h1: `font-size:1.43em;font-weight:700;color:#111;margin:0 0 .9em;padding-bottom:.4em;border-bottom:2.5px solid ${ac};line-height:1.38;font-family:${ff}`,
    h2: `font-size:1.17em;font-weight:700;color:#111;margin:1.6em 0 .55em;padding:.15em 0 .15em 11px;border-left:4px solid ${ac};line-height:1.45;font-family:${ff}`,
    h3: `font-size:1.05em;font-weight:600;color:#222;margin:1.3em 0 .45em;font-family:${ff}`,
    h4: `font-size:1em;font-weight:600;color:#333;margin:1em 0 .4em;font-family:${ff}`,
    p:  `font-size:${bfs};line-height:${blh};color:#333;margin:0 0 ${pmb};font-family:${ff}`,
    ul: `font-size:${bfs};line-height:${blh};color:#333;margin:.3em 0 ${pmb};padding-left:1.6em;font-family:${ff}`,
    ol: `font-size:${bfs};line-height:${blh};color:#333;margin:.3em 0 ${pmb};padding-left:1.6em;font-family:${ff}`,
    li: `margin:.28em 0`,
    blockquote: `margin:1em 0;padding:10px 14px;border-left:4px solid ${ac};background:#f6fff9;border-radius:0 6px 6px 0;color:#555;font-size:.95em;line-height:1.75`,
    strong: `color:#111;font-weight:700`,
    em: `color:#555`,
    a:  `color:${ac};text-decoration:none`,
    hr: `border:none;border-top:1px solid #eee;margin:1.6em 0`,
    img:`max-width:100%;border-radius:6px`,
    table:`width:100%;border-collapse:collapse;margin:.9em 0;font-size:.93em`,
    th: `background:#f5f5f5;color:#222;font-weight:600;padding:8px 12px;border:1px solid #e0e0e0;text-align:left`,
    td: `padding:7px 12px;border:1px solid #eaeaea;color:#333`,
  };
  Object.entries(M).forEach(([tag, style]) => clone.querySelectorAll(tag).forEach(el => el.setAttribute('style', style)));

  // Inline code
  clone.querySelectorAll(':not(pre)>code').forEach(el =>
    el.setAttribute('style',`background:#f5f5f6;padding:2px 6px;border-radius:4px;font-family:'JetBrains Mono',monospace;font-size:.88em;color:#c0392b;border:1px solid #ebebeb`)
  );
  // Code block
  clone.querySelectorAll('.code-wrap pre').forEach(p => {
    p.style.cssText += `;font-family:'JetBrains Mono',monospace;font-size:${cfs};line-height:1.75;padding:14px 16px;margin:0;overflow-x:auto`;
  });
  clone.querySelectorAll('.code-wrap pre code').forEach(c => {
    c.style.cssText = `font-family:'JetBrains Mono',monospace;font-size:${cfs};white-space:pre;background:none;padding:0;border:none`;
  });

  const html = clone.innerHTML;
  if (navigator.clipboard && window.ClipboardItem) {
    navigator.clipboard.write([new ClipboardItem({'text/html': new Blob([html],{type:'text/html'})})])
      .then(copyOK).catch(()=>fallbackCopy(html));
  } else { fallbackCopy(html); }
}

function fallbackCopy(html) {
  const d = document.createElement('div');
  d.innerHTML = html;
  d.style.cssText = 'position:fixed;opacity:0;top:0;left:0;pointer-events:none';
  document.body.appendChild(d);
  const sel = window.getSelection(), range = document.createRange();
  range.selectNodeContents(d); sel.removeAllRanges(); sel.addRange(range);
  try { document.execCommand('copy'); copyOK(); } catch { showToast('复制失败，请手动复制'); }
  sel.removeAllRanges(); document.body.removeChild(d);
}

function copyOK() {
  const btn = document.getElementById('copyBtn');
  btn.textContent = '✓ 已复制'; btn.classList.add('ok');
  showToast('✓ 已复制，可直接粘贴到公众号编辑器');
  setTimeout(() => {
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg> 一键复制';
    btn.classList.remove('ok');
  }, 2500);
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}
